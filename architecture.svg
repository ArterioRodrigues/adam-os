<svg width="720" viewBox="0 0 720 540" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117;">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- User Space -->
  <rect x="40" y="28" width="640" height="88" rx="12" fill="#1b3a2a" stroke="#3fb950" stroke-width="1"/>
  <text x="360" y="50" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="600">USER SPACE  (Ring 3)</text>
  <rect x="60" y="62" width="90" height="38" rx="6" fill="#22543a" stroke="#3fb950" stroke-width="0.5"/>
  <text x="105" y="85" text-anchor="middle" fill="#7ee787" font-size="12">Shell</text>
  <rect x="165" y="62" width="90" height="38" rx="6" fill="#22543a" stroke="#3fb950" stroke-width="0.5"/>
  <text x="210" y="85" text-anchor="middle" fill="#7ee787" font-size="12">Brainfuck</text>
  <rect x="270" y="62" width="90" height="38" rx="6" fill="#22543a" stroke="#3fb950" stroke-width="0.5"/>
  <text x="315" y="85" text-anchor="middle" fill="#7ee787" font-size="12">Vim</text>
  <rect x="375" y="62" width="90" height="38" rx="6" fill="#22543a" stroke="#3fb950" stroke-width="0.5"/>
  <text x="420" y="85" text-anchor="middle" fill="#7ee787" font-size="12">Idle</text>
  <rect x="480" y="62" width="185" height="38" rx="6" fill="#22543a" stroke="#3fb950" stroke-width="0.5"/>
  <text x="572" y="85" text-anchor="middle" fill="#7ee787" font-size="12">User programs</text>

  <!-- Syscall line -->
  <line x1="80" y1="134" x2="640" y2="134" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="8 4"/>
  <rect x="270" y="124" width="180" height="20" rx="4" fill="#0d1117"/>
  <text x="360" y="138" text-anchor="middle" fill="#8b949e" font-size="11">int 0x80 — syscall gate</text>

  <!-- Kernel Container -->
  <rect x="40" y="158" width="640" height="340" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="360" y="180" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">KERNEL SPACE  (Ring 0)</text>

  <!-- Kernel Services row -->
  <rect x="60" y="196" width="148" height="48" rx="6" fill="#1c1d3b" stroke="#8b8cff" stroke-width="0.5"/>
  <text x="134" y="215" text-anchor="middle" fill="#bcbdff" font-size="12" font-weight="600">Syscall handler</text>
  <text x="134" y="232" text-anchor="middle" fill="#7c7dcc" font-size="10">fork exec read write</text>

  <rect x="222" y="196" width="130" height="48" rx="6" fill="#1c1d3b" stroke="#8b8cff" stroke-width="0.5"/>
  <text x="287" y="215" text-anchor="middle" fill="#bcbdff" font-size="12" font-weight="600">Scheduler</text>
  <text x="287" y="232" text-anchor="middle" fill="#7c7dcc" font-size="10">Round-robin</text>

  <rect x="366" y="196" width="145" height="48" rx="6" fill="#1c1d3b" stroke="#8b8cff" stroke-width="0.5"/>
  <text x="438" y="215" text-anchor="middle" fill="#bcbdff" font-size="12" font-weight="600">Process mgmt</text>
  <text x="438" y="232" text-anchor="middle" fill="#7c7dcc" font-size="10">PCB, page dirs</text>

  <rect x="525" y="196" width="140" height="48" rx="6" fill="#1c1d3b" stroke="#8b8cff" stroke-width="0.5"/>
  <text x="595" y="215" text-anchor="middle" fill="#bcbdff" font-size="12" font-weight="600">Stdin buffer</text>
  <text x="595" y="232" text-anchor="middle" fill="#7c7dcc" font-size="10">Blocking I/O</text>

  <!-- Memory row -->
  <rect x="60" y="260" width="148" height="48" rx="6" fill="#0c2d48" stroke="#58a6ff" stroke-width="0.5"/>
  <text x="134" y="279" text-anchor="middle" fill="#a5d6ff" font-size="12" font-weight="600">Page tables</text>
  <text x="134" y="296" text-anchor="middle" fill="#58a6ff" font-size="10">4KB pages, CR3</text>

  <rect x="222" y="260" width="130" height="48" rx="6" fill="#0c2d48" stroke="#58a6ff" stroke-width="0.5"/>
  <text x="287" y="279" text-anchor="middle" fill="#a5d6ff" font-size="12" font-weight="600">Frame alloc</text>
  <text x="287" y="296" text-anchor="middle" fill="#58a6ff" font-size="10">Bitmap, 128MB</text>

  <rect x="366" y="260" width="145" height="48" rx="6" fill="#0c2d48" stroke="#58a6ff" stroke-width="0.5"/>
  <text x="438" y="279" text-anchor="middle" fill="#a5d6ff" font-size="12" font-weight="600">Heap</text>
  <text x="438" y="296" text-anchor="middle" fill="#58a6ff" font-size="10">kmalloc / kfree</text>

  <rect x="525" y="260" width="140" height="48" rx="6" fill="#0c2d48" stroke="#58a6ff" stroke-width="0.5"/>
  <text x="595" y="279" text-anchor="middle" fill="#a5d6ff" font-size="12" font-weight="600">FAT16</text>
  <text x="595" y="296" text-anchor="middle" fill="#58a6ff" font-size="10">Persistent FS</text>

  <!-- Drivers row -->
  <rect x="60" y="324" width="148" height="48" rx="6" fill="#3b1d0c" stroke="#f0883e" stroke-width="0.5"/>
  <text x="134" y="343" text-anchor="middle" fill="#ffb86c" font-size="12" font-weight="600">VGA driver</text>
  <text x="134" y="360" text-anchor="middle" fill="#d4843a" font-size="10">80×25 text mode</text>

  <rect x="222" y="324" width="130" height="48" rx="6" fill="#3b1d0c" stroke="#f0883e" stroke-width="0.5"/>
  <text x="287" y="343" text-anchor="middle" fill="#ffb86c" font-size="12" font-weight="600">Keyboard</text>
  <text x="287" y="360" text-anchor="middle" fill="#d4843a" font-size="10">PS/2, IRQ1</text>

  <rect x="366" y="324" width="145" height="48" rx="6" fill="#3b1d0c" stroke="#f0883e" stroke-width="0.5"/>
  <text x="438" y="343" text-anchor="middle" fill="#ffb86c" font-size="12" font-weight="600">PIT timer</text>
  <text x="438" y="360" text-anchor="middle" fill="#d4843a" font-size="10">100Hz, IRQ0</text>

  <rect x="525" y="324" width="140" height="48" rx="6" fill="#3b1d0c" stroke="#f0883e" stroke-width="0.5"/>
  <text x="595" y="343" text-anchor="middle" fill="#ffb86c" font-size="12" font-weight="600">ATA PIO disk</text>
  <text x="595" y="360" text-anchor="middle" fill="#d4843a" font-size="10">LBA28 R/W</text>

  <!-- CPU / Hardware row -->
  <rect x="60" y="388" width="148" height="48" rx="6" fill="#21262d" stroke="#484f58" stroke-width="0.5"/>
  <text x="134" y="407" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">GDT + TSS</text>
  <text x="134" y="424" text-anchor="middle" fill="#8b949e" font-size="10">6 segment entries</text>

  <rect x="222" y="388" width="130" height="48" rx="6" fill="#21262d" stroke="#484f58" stroke-width="0.5"/>
  <text x="287" y="407" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">IDT</text>
  <text x="287" y="424" text-anchor="middle" fill="#8b949e" font-size="10">256 vectors</text>

  <rect x="366" y="388" width="145" height="48" rx="6" fill="#21262d" stroke="#484f58" stroke-width="0.5"/>
  <text x="438" y="407" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">PIC 8259</text>
  <text x="438" y="424" text-anchor="middle" fill="#8b949e" font-size="10">IRQ remapping</text>

  <rect x="525" y="388" width="140" height="48" rx="6" fill="#21262d" stroke="#484f58" stroke-width="0.5"/>
  <text x="595" y="407" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">Bootloader</text>
  <text x="595" y="424" text-anchor="middle" fill="#8b949e" font-size="10">Real → protected</text>

  <!-- Boot flow arrow at bottom -->
  <text x="360" y="468" text-anchor="middle" fill="#484f58" font-size="11">BIOS → Bootloader (0x7C00) → Protected Mode → Kernel (0x1000) → User Space (0x40000000)</text>

  <!-- Legend -->
  <rect x="100" y="490" width="10" height="10" rx="2" fill="#22543a" stroke="#3fb950" stroke-width="0.5"/>
  <text x="116" y="499" fill="#8b949e" font-size="10">User</text>
  <rect x="170" y="490" width="10" height="10" rx="2" fill="#1c1d3b" stroke="#8b8cff" stroke-width="0.5"/>
  <text x="186" y="499" fill="#8b949e" font-size="10">Kernel</text>
  <rect x="250" y="490" width="10" height="10" rx="2" fill="#0c2d48" stroke="#58a6ff" stroke-width="0.5"/>
  <text x="266" y="499" fill="#8b949e" font-size="10">Memory + FS</text>
  <rect x="360" y="490" width="10" height="10" rx="2" fill="#3b1d0c" stroke="#f0883e" stroke-width="0.5"/>
  <text x="376" y="499" fill="#8b949e" font-size="10">Drivers</text>
  <rect x="440" y="490" width="10" height="10" rx="2" fill="#21262d" stroke="#484f58" stroke-width="0.5"/>
  <text x="456" y="499" fill="#8b949e" font-size="10">CPU / Hardware</text>
</svg>
